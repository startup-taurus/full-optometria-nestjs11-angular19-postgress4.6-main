services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - dev-oftalmologia_db_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d
    networks:
      - dev-oftalmologia_red_privada
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-nest-oftalmologia
      dockerfile: Dockerfile
    hostname: dev-oftalmologia-backend
    user: "1001:1001"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL}
      API_PREFIX: ${API_PREFIX}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_SECURE: ${MAIL_SECURE}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      WHATSAPP_AUTH_BASE_PATH: /app/uploads/whatsapp-auth
    volumes:
      - dev-oftalmologia_backend_uploads:/app/uploads
    ports:
      - "3003:3000"
    networks:
      - dev-oftalmologia_red_publica
      - dev-oftalmologia_red_privada
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/${API_PREFIX:-v1/api} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend-oftalmologia
      dockerfile: Dockerfile
    ports:
      - "8083:80"
    networks:
      - dev-oftalmologia_red_publica
    depends_on:
      - backend

volumes:
  dev-oftalmologia_db_data:
    name: dev-oftalmologia_db_data
  dev-oftalmologia_backend_uploads:
    name: dev-oftalmologia_backend_uploads

networks:
  dev-oftalmologia_red_publica:
    name: dev-oftalmologia_red_publica
    driver: bridge
  dev-oftalmologia_red_privada:
    name: dev-oftalmologia_red_privada
    driver: bridge
    internal: true
