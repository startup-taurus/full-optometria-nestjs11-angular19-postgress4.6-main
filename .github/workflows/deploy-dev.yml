name: Deploy Develop Environment

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-dev-oftalmologia-develop
  cancel-in-progress: true

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy develop over SSH
        env:
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          PORT="${SERVER_PORT:-22}"
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$PORT" "$SERVER_USER@$SERVER_HOST" <<'EOF'
            set -e

            PROJECT_PATH="/var/www/dev-oftalmologia"
            PROJECT_NAME="dev-oftalmologia"
            REPO_SSH_URL="git@github.com:${{ github.repository }}.git"

            mkdir -p "$PROJECT_PATH"

            if [ ! -d "$PROJECT_PATH/.git" ]; then
              git clone --branch develop --single-branch "$REPO_SSH_URL" "$PROJECT_PATH"
            fi

            cd "$PROJECT_PATH"
            git config --global --add safe.directory "$PROJECT_PATH"

            git fetch origin develop
            git checkout develop
            git reset --hard origin/develop
            git clean -fd

            if [ ! -f "$PROJECT_PATH/.env" ]; then
              echo "ERROR: Falta el archivo .env en $PROJECT_PATH"
              echo "Crea $PROJECT_PATH/.env con las variables requeridas antes del despliegue."
              exit 1
            fi

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            echo "=== Deteniendo solo contenedores del entorno dev-oftalmologia ==="
            $COMPOSE_CMD -f docker-compose.dev.yml -p "$PROJECT_NAME" down --remove-orphans || true

            echo "=== Reconstruyendo imagenes del entorno dev-oftalmologia ==="
            $COMPOSE_CMD -f docker-compose.dev.yml -p "$PROJECT_NAME" build --pull

            echo "=== Iniciando entorno dev-oftalmologia ==="
            $COMPOSE_CMD -f docker-compose.dev.yml -p "$PROJECT_NAME" up -d

            echo "=== Verificando esquema base en la base de datos ==="
            SCHEMA_OK=$($COMPOSE_CMD -f docker-compose.dev.yml -p "$PROJECT_NAME" exec -T db \
              sh -lc 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc "SELECT (
                EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema=\$\$public\$\$ AND table_name=\$\$users\$\$) AND
                EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema=\$\$public\$\$ AND table_name=\$\$companies\$\$) AND
                EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema=\$\$public\$\$ AND table_name=\$\$branches\$\$)
              )::text;"' | tr -d '[:space:]')

            if [ "$SCHEMA_OK" != "true" ]; then
              echo "ADVERTENCIA: Esquema base incompleto. Se forzara reinicializacion de volumen de BD una sola vez."
              $COMPOSE_CMD -f docker-compose.dev.yml -p "$PROJECT_NAME" down -v --remove-orphans || true
              $COMPOSE_CMD -f docker-compose.dev.yml -p "$PROJECT_NAME" up -d

              SCHEMA_OK=$($COMPOSE_CMD -f docker-compose.dev.yml -p "$PROJECT_NAME" exec -T db \
                sh -lc 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc "SELECT (
                  EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema=\$\$public\$\$ AND table_name=\$\$users\$\$) AND
                  EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema=\$\$public\$\$ AND table_name=\$\$companies\$\$) AND
                  EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema=\$\$public\$\$ AND table_name=\$\$branches\$\$)
                )::text;"' | tr -d '[:space:]')

              if [ "$SCHEMA_OK" != "true" ]; then
                echo "ERROR: La base sigue incompleta despues de reinicializacion. Revisa db_init/02-restore-data.sql y logs de db."
                exit 1
              fi
            fi

            echo "=== Estado del entorno dev-oftalmologia ==="
            $COMPOSE_CMD -f docker-compose.dev.yml -p "$PROJECT_NAME" ps

            echo "=== Despliegue de develop completado ==="
          EOF
