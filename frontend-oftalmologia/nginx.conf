server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  location ~* ^/assets/i18n/.*\.json$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpe?g|gif|ico|webp|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  gzip on;
  gzip_static on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;
}
