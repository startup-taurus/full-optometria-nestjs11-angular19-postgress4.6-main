<div class="modal-header">
  <h4 class="modal-title">{{ modalTitle }}</h4>
  <button
    type="button"
    class="btn-close ms-auto"
    aria-label="Close"
    (click)="onCancel()"
  ></button>
</div>

<div class="modal-progress">
  <div class="container-fluid px-4 py-2">
    <div class="row">
      <div class="col-12">
        <div class="steps-container">
          @for (step of [].constructor(totalSteps); track $index) {
            <div class="step-item">
              <div
                class="step-circle"
                [class]="getStepClasses($index + 1)"
                [class.clickable]="isStepClickable($index + 1)"
                (click)="onStepClick($index + 1)"
              >
                @if ($index + 1 < currentStep) {
                  ✓
                } @else {
                  {{ $index + 1 }}
                }
              </div>
              <div class="step-label">
                <span>{{ stepLabels[$index] || 'Paso ' + ($index + 1) }}</span>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-body">
  <div class="step-content">
    <ng-content></ng-content>
  </div>
</div>

<div class="modal-footer d-flex justify-content-between flex-wrap">
  <div class="footer-left">
    @if (currentStep > 1 && !hidePreviousButton) {
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="onPrevious()"
        [disabled]="isLoading"
      >
        <i class="ti ti-arrow-left me-1"></i>
        {{ 'PREVIOUS' | translate }}
      </button>
    }
  </div>

  <div class="footer-right d-flex gap-2">
    <button
      type="button"
      class="btn btn-outline-secondary"
      (click)="onCancel()"
      [disabled]="isLoading"
    >
      {{ 'CANCEL' | translate }}
    </button>

    @if (currentStep < totalSteps) {
      <button
        type="button"
        class="btn btn-primary"
        (click)="onNext()"
        [disabled]="!canProceedNext || isLoading"
      >
        {{ 'NEXT' | translate }}
        <i class="ti ti-arrow-right ms-1"></i>
      </button>
    } @else {
      <button
        type="button"
        class="btn btn-success"
        (click)="onSave()"
        [disabled]="!canSave || isLoading"
      >
        @if (isLoading) {
          <span
            class="spinner-border spinner-border-sm me-2"
            role="status"
          ></span>
        }
        @if (editMode) {
          <i class="ti ti-check me-1"></i>
          Actualizar
        } @else {
          <i class="ti ti-check me-1"></i>
          Guardar
        }
      </button>
    }
  </div>
</div>
