<div class="forgot-password-container">
  <div class="forgot-password-wrapper">
    <div class="forgot-password-card">
      <div class="card-header-section">
        <div class="icon-wrapper">
          <i class="ti ti-lock-question"></i>
        </div>
        <h2 class="title">{{ 'AUTH.FORGOT_PASSWORD.TITLE' | translate }}</h2>
        <p class="subtitle">
          {{ 'AUTH.FORGOT_PASSWORD.SUBTITLE' | translate }}
        </p>
      </div>

      <div class="card-body-section">
        <div *ngIf="!emailSent">
          <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="email" class="form-label">{{
                'AUTH.EMAIL' | translate
              }}</label>
              <input
                type="email"
                class="form-control"
                id="email"
                formControlName="email"
                placeholder="{{ 'AUTH.EMAIL_PLACEHOLDER' | translate }}"
                [class.is-invalid]="isFieldInvalid('email')"
              />
              <div class="invalid-feedback" *ngIf="isFieldInvalid('email')">
                {{ 'AUTH.ERRORS.EMAIL_INVALID' | translate }}
              </div>
            </div>

            <div class="auth-actions">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="isLoading || forgotPasswordForm.invalid"
              >
                <span
                  *ngIf="isLoading"
                  class="spinner-border spinner-border-sm me-2"
                ></span>
                <i class="ti ti-mail fs-16 me-1" *ngIf="!isLoading"></i>
                {{ 'AUTH.FORGOT_PASSWORD.SEND_LINK' | translate }}
              </button>
            </div>
          </form>
        </div>

        <div *ngIf="emailSent" class="success-state">
          <i class="ti ti-mail-check success-icon"></i>
          <h5>{{ 'AUTH.FORGOT_PASSWORD.EMAIL_SENT' | translate }}</h5>
          <p>{{ 'AUTH.FORGOT_PASSWORD.EMAIL_SENT_MESSAGE' | translate }}</p>
          <div class="auth-actions">
            <button
              type="button"
              class="btn btn-outline-primary"
              (click)="resendEmail()"
            >
              <i class="ti ti-refresh fs-16 me-1"></i>
              {{ 'AUTH.FORGOT_PASSWORD.RESEND' | translate }}
            </button>
          </div>
        </div>

        <div class="back-to-login">
          <a
            href="javascript:void(0)"
            (click)="backToLogin()"
            class="back-link"
          >
            <i class="ti ti-arrow-left"></i>
            <span>{{ 'AUTH.BACK_TO_LOGIN' | translate }}</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
