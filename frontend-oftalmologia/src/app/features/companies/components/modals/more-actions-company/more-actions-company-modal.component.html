<div class="modal-header">
  <h5 class="modal-title">
    <i class="ti ti-dots me-2"></i>
    {{ 'COMPANIES_MODULE.MORE_ACTIONS' | translate }}
  </h5>
  <button type="button" class="btn-close" (click)="closeModal()"></button>
</div>

<div class="modal-body">
  <div class="card mb-3">
    <div class="card-body">
      <h6 class="mb-2">{{ selectedCompany.name }}</h6>
      <p class="text-muted mb-0">
        <small>{{ 'COMPANIES_MODULE.CODE' | translate }}: {{ selectedCompany.code }}</small>
      </p>
      <span
        class="badge rounded-pill mt-2"
        [class.bg-success]="selectedCompany.isActive"
        [class.bg-danger]="!selectedCompany.isActive"
      >
        {{
          (selectedCompany.isActive ? 'WORDS.ACTIVE' : 'WORDS.INACTIVE')
            | translate
        }}
      </span>
    </div>
  </div>

  <div class="list-group list-group-flush">
    <button
      type="button"
      class="list-group-item list-group-item-action d-flex align-items-center"
      (click)="viewDetails()"
    >
      <i class="ti ti-eye text-info me-3 fs-5"></i>
      <div>
        <div class="fw-semibold">{{ 'COMPANIES_MODULE.VIEW_DETAILS' | translate }}</div>
        <small class="text-muted">{{ 'COMPANIES_MODULE.VIEW_COMPANY_INFO' | translate }}</small>
      </div>
    </button>

    <button
      type="button"
      class="list-group-item list-group-item-action d-flex align-items-center"
      (click)="changeStatus()"
    >
      <i class="ti ti-switch text-warning me-3 fs-5"></i>
      <div>
        <div class="fw-semibold">{{ 'COMPANIES_MODULE.CHANGE_STATUS' | translate }}</div>
        <small class="text-muted">{{ 'COMPANIES_MODULE.ACTIVATE_DEACTIVATE' | translate }}</small>
      </div>
    </button>

    <button
      type="button"
      class="list-group-item list-group-item-action d-flex align-items-center"
      (click)="editCompany()"
    >
      <i class="ti ti-edit text-primary me-3 fs-5"></i>
      <div>
        <div class="fw-semibold">{{ 'COMPANIES_MODULE.EDIT_COMPANY' | translate }}</div>
        <small class="text-muted">{{ 'COMPANIES_MODULE.EDIT_COMPANY_INFO' | translate }}</small>
      </div>
    </button>

    <button
      type="button"
      class="list-group-item list-group-item-action d-flex align-items-center"
      (click)="deleteCompany()"
    >
      <i class="ti ti-trash text-danger me-3 fs-5"></i>
      <div>
        <div class="fw-semibold">{{ 'COMPANIES_MODULE.DELETE_COMPANY' | translate }}</div>
        <small class="text-muted">{{ 'COMPANIES_MODULE.DELETE_COMPANY_WARNING' | translate }}</small>
      </div>
    </button>
  </div>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="closeModal()">
    {{ 'WORDS.CANCEL' | translate }}
  </button>
</div>
