<page-title title="{{ 'MEDICAL_HISTORY.TITLE' | translate }}" />

<div class="container-fluid">
  <div class="row g-4">
    <div class="col-12">
      <div class="card common-datatable-card border-0 shadow-sm">
        <div class="card-header border-bottom">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0 text-primary">
              <i class="ti ti-history me-2"></i>
              {{ 'MEDICAL_HISTORY.TABLE.TITLE' | translate }}
            </h5>
            <div class="d-flex gap-2">
              <button
                class="btn btn-outline-danger btn-sm filter-clear-btn"
                type="button"
                placement="top"
                [ngbTooltip]="'WORDS.RESET' | translate"
                (click)="sideFilterPanel.resetFilters()"
                *ngIf="sideFilterPanel?.hasActiveFilters()"
              >
                <i class="ti ti-filter-off"></i>
              </button>

              <button
                class="btn btn-outline-secondary btn-sm"
                type="button"
                placement="top"
                [ngbTooltip]="'WORDS.RELOAD_TABLE' | translate"
                (click)="reloadDatatable()"
              >
                <i class="ti ti-refresh"></i>
              </button>

              <button
                class="btn btn-outline-secondary btn-sm"
                type="button"
                placement="top"
                [ngbTooltip]="'MEDICAL_HISTORY.BUTTONS.ADD_RECORD' | translate"
                (click)="openModal(BUTTON_ACTIONS.ADD)"
              >
                <i class="ti ti-plus"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="card-body p-0">
          <shared-ngx-datatable
            [config]="config$ | async"
            [data]="data$ | async"
            (onChangeLimit)="onChangeLimit($event)"
            (onChangePage)="onChangePage($event)"
            class="common-ngx-datatable"
          >
          </shared-ngx-datatable>
        </div>
      </div>
    </div>
  </div>
</div>

<side-filter-panel
  #sideFilterPanel
  [filterComponent]="sideFilterComponent"
  [config]="{
    title: 'INVENTORY.FILTER.TITLE',
    showBadge: true,
    position: 'right',
    width: '400px',
    backdrop: true,
    closeOnEsc: true,
  }"
  (filterApplied)="onSideFilterApplied($event)"
  (filterCleared)="onSideFilterCleared()"
  (resetRequested)="onSideFilterCleared()"
>
</side-filter-panel>

<ng-template #statusTemplate let-row="row" let-rowIndex="rowIndex">
  <span
    class="badge common-badge badge-sm border"
    [class.bg-success-subtle]="row.status === 'enviado'"
    [class.text-success-emphasis]="row.status === 'enviado'"
    [class.border-success-subtle]="row.status === 'enviado'"
    [class.bg-warning-subtle]="row.status === 'pendiente'"
    [class.text-warning-emphasis]="row.status === 'pendiente'"
    [class.border-warning-subtle]="row.status === 'pendiente'"
    [class.bg-danger-subtle]="row.status === 'cancelado'"
    [class.text-danger-emphasis]="row.status === 'cancelado'"
    [class.border-danger-subtle]="row.status === 'cancelado'"
  >
    {{ 'MEDICAL_HISTORY.STATUS.' + row.status.toUpperCase() | translate }}
  </span>
</ng-template>

<ng-template #actionsTemplate let-row="row">
  <div class="d-flex gap-1 flex-wrap">
    <button
      type="button"
      class="btn btn-sm btn-outline-secondary"
      (click)="openModal(BUTTON_ACTIONS.VIEW, row)"
      [attr.aria-label]="'MEDICAL_HISTORY.ACTIONS.VIEW_DETAILS' | translate"
      [ngbTooltip]="'MEDICAL_HISTORY.ACTIONS.VIEW_DETAILS' | translate"
      placement="left"
    >
      <i class="ti ti-eye"></i>
    </button>
    <!-- <button
      *ngIf="row.status === 'pendiente'"
      type="button"
      class="btn btn-sm btn-outline-success"
      (click)="sendRecord(row)"
      [attr.aria-label]="'MEDICAL_HISTORY.ACTIONS.SEND' | translate"
      [ngbTooltip]="'MEDICAL_HISTORY.ACTIONS.SEND' | translate"
      placement="left"
    >
      <i class="fa fa-paper-plane"></i>
    </button> -->
    <button
      type="button"
      class="btn btn-sm btn-outline-secondary"
      (click)="openModal(BUTTON_ACTIONS.EDIT, row)"
      [attr.aria-label]="'MEDICAL_HISTORY.ACTIONS.EDIT' | translate"
      [ngbTooltip]="'MEDICAL_HISTORY.ACTIONS.EDIT' | translate"
      placement="left"
    >
      <i class="ti ti-edit"></i>
    </button>
    <button
      type="button"
      class="btn btn-sm btn-outline-primary"
      (click)="duplicateRecord(row)"
      [attr.aria-label]="'Duplicar historia clínica'"
      [ngbTooltip]="'Duplicar historia clínica'"
      placement="left"
    >
      <i class="ti ti-copy"></i>
    </button>
    <button
      *ngIf="row.status !== 'cancelado'"
      type="button"
      class="btn btn-sm btn-outline-danger"
      (click)="openModal(BUTTON_ACTIONS.DELETE, row)"
      [attr.aria-label]="'MEDICAL_HISTORY.ACTIONS.DELETE' | translate"
      [ngbTooltip]="'MEDICAL_HISTORY.ACTIONS.DELETE' | translate"
      placement="left"
    >
      <i class="ti ti-trash"></i>
    </button>
    <button
      type="button"
      class="btn btn-sm btn-outline-info"
      (click)="createLaboratoryOrder(row)"
      [attr.aria-label]="'Crear Orden Lab'"
      [ngbTooltip]="'LABORATORY_ORDERS.CREATE_TITLE' | translate"
      placement="left"
    >
      <i class="ti ti-flask"></i>
    </button>
  </div>
</ng-template>
