<div class="wa-loading">
  <div class="wa-loading__qr-skeleton" aria-hidden="true">
    <div class="wa-loading__qr-corners">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="wa-loading__qr-cells">
      @for (cell of cells; track cell) {
        <span class="wa-loading__qr-cell" [style.animation-delay.ms]="cell * 35"></span>
      }
    </div>
    <div class="wa-loading__scan-line"></div>
  </div>

  <div class="wa-loading__icons" aria-hidden="true">
    <div class="wa-loading__icon" [class.is-active]="stepIndex() === 0">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="14" width="44" height="10" rx="2" stroke="currentColor" stroke-width="2.5"/>
        <rect x="10" y="28" width="44" height="10" rx="2" stroke="currentColor" stroke-width="2.5"/>
        <rect x="10" y="42" width="44" height="10" rx="2" stroke="currentColor" stroke-width="2.5"/>
        <circle cx="18" cy="19" r="1.6" fill="currentColor"/>
        <circle cx="18" cy="33" r="1.6" fill="currentColor"/>
        <circle cx="18" cy="47" r="1.6" fill="currentColor"/>
      </svg>
    </div>

    <div class="wa-loading__connector">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="wa-loading__icon" [class.is-active]="stepIndex() === 1">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 26 C20 14, 44 14, 56 26" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="wifi-arc arc-1"/>
        <path d="M14 34 C24 24, 40 24, 50 34" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="wifi-arc arc-2"/>
        <path d="M22 42 C28 36, 36 36, 42 42" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="wifi-arc arc-3"/>
        <circle cx="32" cy="50" r="3.5" fill="currentColor"/>
      </svg>
    </div>

    <div class="wa-loading__connector">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="wa-loading__icon" [class.is-active]="stepIndex() === 2">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 10 H22 V22 H10 Z M42 10 H54 V22 H42 Z M10 42 H22 V54 H10 Z" stroke="currentColor" stroke-width="2.5" fill="none"/>
        <rect x="14" y="14" width="4" height="4" fill="currentColor"/>
        <rect x="46" y="14" width="4" height="4" fill="currentColor"/>
        <rect x="14" y="46" width="4" height="4" fill="currentColor"/>
        <rect x="30" y="30" width="4" height="4" fill="currentColor"/>
        <rect x="40" y="38" width="4" height="4" fill="currentColor"/>
        <rect x="48" y="46" width="4" height="4" fill="currentColor"/>
      </svg>
    </div>
  </div>

  <p class="wa-loading__text">
    {{ steps[stepIndex()] | translate }}
  </p>

  <div class="wa-loading__dots" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>
