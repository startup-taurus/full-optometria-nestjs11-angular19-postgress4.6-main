<page-title title="{{ 'FEEDBACK.TITLE' | translate }}" />

<div class="container-fluid">
  <div class="row g-3">
    <div class="col-12" *ngIf="permissionsService.isSuperAdmin()">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h6 class="mb-1">{{ 'FEEDBACK.ADMIN_ACCESS_TITLE' | translate }}</h6>
            <small class="text-muted">{{ 'FEEDBACK.ADMIN_ACCESS_TEXT' | translate }}</small>
          </div>
          <a class="btn btn-outline-primary btn-sm" routerLink="/system-management/feedback">
            {{ 'FEEDBACK.GO_TO_ADMIN' | translate }}
          </a>
        </div>
      </div>
    </div>

    <div class="col-12 col-xl-5">
      <app-create-feedback-form (feedbackCreated)="onFeedbackCreated()"></app-create-feedback-form>
    </div>

    <div class="col-12 col-xl-7">
      <app-feedback-table [refreshToken]="refreshToken"></app-feedback-table>
    </div>
  </div>
</div>
